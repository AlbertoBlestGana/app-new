<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Registro de Uso de Equipos</title>

<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
margin:10px
}

h1{color:#0f6c6d}

input{
padding:10px;
margin:8px;
width:80%;
font-size:16px
}

button{
padding:10px 16px;
margin:8px;
font-size:16px;
background:#0f6c6d;
color:white;
border:none;
border-radius:6px
}

#app{display:none}

#reader{width:300px;margin:auto}

.lista{
background:white;
border:1px solid #ccc;
padding:10px;
margin:6px;
cursor:pointer
}

.logo{
width:200px;
margin-top:20px
}

.tabla{
background:white;
margin-top:15px;
border:1px solid #ccc;
padding:10px
}

</style>

</head>

<body>

<h1>REGISTRO DE USO DE EQUIPOS</h1>

<div id="login">

<h3>Docente a cargo</h3>

<input id="docente" placeholder="Nombre y Apellido">

<br>

<button onclick="iniciarSistema()">Continuar</button>

<br>

<img src="logo.png" class="logo">

</div>

<div id="app">

<h3 id="docenteNombre"></h3>

<h2>Seleccionar Curso</h2>

<div id="cursos"></div>

<h2>Buscar Alumno</h2>

<input id="buscarAlumno" placeholder="Buscar..." oninput="filtrarAlumno()">

<div id="alumnos"></div>

<h2>Escaneo de Equipo</h2>

<div id="reader"></div>

<p id="resultado"></p>

<button onclick="exportarExcel()">Exportar Excel</button>

<h2>Equipos usados por curso</h2>

<div id="estadisticas" class="tabla"></div>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="app.js"></script>

</body>
</html>
